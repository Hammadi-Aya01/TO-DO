<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ My To-Do App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h1 svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .input-group {
            display: flex;
            gap: 12px;
            padding: 25px;
            background: #fafafa;
            border-bottom: 2px solid #eee;
        }

        input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
        }

        button {
            padding: 16px 28px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
        }

        ul {
            list-style: none;
            padding: 25px;
            max-height: 400px;
            overflow-y: auto;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            margin: 12px 0;
            border-radius: 16px;
            background: #f8f9ff;
            box-shadow: 0 3px 10px rgba(0,0,0,0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #eef2ff;
        }

        li:hover {
            transform: translateX(4px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .task-text {
            flex: 1;
            font-size: 17px;
            color: #2d3748;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .completed .task-text {
            text-decoration: line-through;
            color: #a0aec0;
            opacity: 0.8;
        }

        .task-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #4facfe;
            transform: scale(1.1);
            transition: transform 0.2s ease;
        }

        input[type="checkbox"]:hover {
            transform: scale(1.2);
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 6px rgba(255, 107, 107, 0.3);
        }

        .delete-btn:hover {
            background: #ee5253;
            transform: rotate(90deg);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #a0aec0;
            font-style: italic;
            font-size: 18px;
            font-weight: 500;
        }

        /* Completed tasks move to bottom + fade */
        .completed {
            margin-top: 20px !important;
            background: #f0f4ff;
            border: 1px dashed #c5c8ff;
            animation: slideDown 0.5s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar styling */
        ul::-webkit-scrollbar {
            width: 6px;
        }
        ul::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ul::-webkit-scrollbar-thumb {
            background: #c5c8ff;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                My To-Do App
            </h1>
        </header>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button onclick="addTask()">Add Task</button>
        </div>

        <ul id="taskList">
            <div class="empty-state" id="emptyMsg">✨ Your to-do list is empty. Add a task to get started!</div>
        </ul>
    </div>

    <script>
        // Load tasks from localStorage
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        renderTasks();

        function addTask() {
            const input = document.getElementById("taskInput");
            const taskText = input.value.trim();
            if (!taskText) return;

            tasks.push({ text: taskText, completed: false });
            saveAndRender();
            input.value = "";
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveAndRender();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const taskList = document.getElementById("taskList");
            const emptyMsg = document.getElementById("emptyMsg");

            taskList.innerHTML = '';
            if (tasks.length === 0) {
                taskList.innerHTML = '<div class="empty-state" id="emptyMsg">✨ Your to-do list is empty. Add a task to get started!</div>';
                return;
            }

            // Sort: Active tasks first, completed tasks at bottom
            const sortedTasks = [...tasks].sort((a, b) => a.completed - b.completed);

            sortedTasks.forEach((task, index) => {
                const li = document.createElement("li");
                if (task.completed) li.classList.add('completed');

                li.innerHTML = `
                    <span class="task-text">${task.text}</span>
                    <div class="task-actions">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index})">
                        <button class="delete-btn" onclick="deleteTask(${index})">×</button>
                    </div>
                `;
                taskList.appendChild(li);
            });
        }
    </script>
</body>
</html>
